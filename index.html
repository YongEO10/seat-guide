<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Informasi Tempat Duduk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Selamat Datang 🤍</h1>
<p>Silakan masukkan nama Anda</p>

<input 
  type="text" 
  id="searchName" 
  placeholder="Contoh: Andi"
  style="padding:12px; width:80%; max-width:400px;"
>

<br><br>

<button onclick="searchGuest()">Cari Tempat Duduk</button>

<div id="result" style="margin-top:30px;"></div>

<script src="data.js"></script>
<script>
function searchGuest() {
  const input = document.getElementById("searchName").value.toLowerCase().trim();
  const resultDiv = document.getElementById("result");

  const found = guests.find(g =>
    g.name.toLowerCase().includes(input)
  );

  if (found) {
    resultDiv.innerHTML = `
      <h2>${found.name}</h2>
      <p>Meja: ${found.table}</p>
      <p>Jumlah Tamu: ${found.jumlah}</p>
    `;
  } else {
    resultDiv.innerHTML = "Data tamu tidak ditemukan.";
  }
}
</script>

</body>
</html>
